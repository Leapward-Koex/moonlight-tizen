# Tizen project metadata for the assembled Flutter preview widget.
project_type: web_app
profile: tv-samsung
api_version: "10.0"
build_type: Release
output_name: MoonlightFlutter
output_path: ""
opt: false
signing_profile: ""
trust_anchor: []

files:
  - config.xml
  - index.html
  - favicon.png
  - manifest.json
  - flutter.js
  - flutter_bootstrap.js
  - main.dart.js
  - version.json
  - assets
  - canvaskit
  - icons
  - native
  - styles
  - moonlight-wasm.js
  - moonlight-wasm.js.mem
  - moonlight-wasm.wasm
  - moonlight-wasm.worker.js

excludes:
  - author-signature.xml
  - signature1.xml
  - tizen_web_project.yaml
  - "*.wgt"
  - Debug/*
  - Release/*
  - Test/*

deps: []
