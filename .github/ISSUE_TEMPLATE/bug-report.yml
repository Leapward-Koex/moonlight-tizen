name: Bug Report
description: Report something that isn`t working
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        ## Device Information
        Please provide information about the device you are using as a client.
  - type: input
    attributes:
      label: Moonlight Version
      description: What is the version of Moonlight you are using?
      placeholder: "Example: 1.10.0"
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Installation Type
      description: What is the method you used to install Moonlight on your device?
      options:
        - Apps2Samsung
        - Tizen Studio
        - Docker
    validations:
      required: true
  - type: input
    attributes:
      label: Device Model
      description: What is the model of your device?
      placeholder: "Example: UAU7000 or UE55AU7172UXXH"
    validations:
      required: true
  - type: input
    attributes:
      label: Device OS
      description: What is the OS version of your device?
      placeholder: "Example: Tizen 6.0"
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        ## Host Information
        Please provide information about the computer you are streaming from.
        This information is important especially when experiencing performance issues.
  - type: dropdown
    attributes:
      label: Host OS
      description: What is the OS of your computer?
      options:
        - Windows
        - Linux
        - macOS
  - type: dropdown
    attributes:
      label: Host Software
      description: What streaming software are you using?
      options:
        - Sunshine
        - GeForce Experience
  - type: textarea
    attributes:
      label: Host Setup
      description: What is the hardware and software setup of your computer?
      placeholder: "Example: Intel Core i7-14700K, NVIDIA GeForce RTX 4080, 32GB RAM DDR4, 240Hz Monitor, Windows 11 Pro 25H2."
  - type: markdown
    attributes:
      value: |
        ## Issue Information
        Please provide information about the issue you are experiencing.
        This information is important to help us understand the issue.
  - type: textarea
    attributes:
      label: Bug Description
      description: What kind of incorrect behavior did you see?
      placeholder: "Example: I can't see video output when I start streaming!"
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction Steps
      description: Can you reproduce the issue? If so, please share below as steps.
      placeholder: |
        Example: 
        1. Select computer.
        2. Open "Desktop" in the apps list.
        3. Wait for the connection to be established.
        4. Seeing black screen without video.
  - type: textarea
    attributes:
      label: Expected Behavior
      description: What is the correct behavior do you think?
      placeholder: "Example: Seeing video output of my computer screen!"
  - type: textarea
    attributes:
      label: Log Files
      description: Provide any relevant logs to help us diagnose the issue.
      placeholder: "Drag and drop the Moonlight and/or Sunshine log files here or click to upload."
  - type: textarea
    attributes:
      label: Screenshots
      description: Provide any relevant screenshots to help us troubleshoot the issue.
      placeholder: "Drag and drop any relevant screenshots here or click to upload."
