# This workflow builds a Docker image from the repository, pushes it to GitHub Container Registry, and then triggers a second job to extract an artifact and create a GitHub pre-release.
name: Release (Development)
# Configure this workflow to be triggered manually from the GitHub Actions tab for development-related branches.
on:
  workflow_dispatch:
# Defines two custom environment variables for the workflow. These are used for the Container registry domain, and a name for the Docker image that this workflow builds.
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
# There is a single job in this workflow. It's configured to run on the latest available version of Ubuntu.
jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    # Sets the permissions granted to the `GITHUB_TOKEN` for the actions in this job.
    permissions:
      contents: read
      packages: write
      issues: write
      actions: write
    outputs:
      runtime_image: ${{ steps.image_tags.outputs.runtime }}
      short_sha: ${{ github.sha }}
    # This job checks out the code, logs into GitHub Container Registry, builds the Docker image with metadata, pushes it to the registry, and triggers the next workflow via repository dispatch.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      # Uses the `docker/login-action` action to log in to the Container registry using the account and password that will publish the packages. Once published, the packages are scoped to the account defined here.
      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # This step uses [docker/metadata-action](https://github.com/docker/metadata-action#about) to extract tags and labels that will be applied to the specified image. The `id` "meta" allows the output of this step to be referenced in a subsequent step. The `images` value provides the base name for the tags and labels.
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Set Docker image tags
        id: image_tags
        run: |
          IMAGE_NAME=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "runtime=${REGISTRY}/${IMAGE_NAME}:${GITHUB_SHA}-runtime" >> "$GITHUB_OUTPUT"
      # This step uses the `docker/build-push-action` action to build the image, based on your repository's `Dockerfile`. If the build succeeds, it pushes the image to GitHub Packages.
      # It uses the `context` parameter to define the build's context as the set of files located in the specified path. For more information, see "[Usage](https://github.com/docker/build-push-action#usage)" in the README of the `docker/build-push-action` repository.
      # It uses the `tags` and `labels` parameters to tag and label the image with the output from the "meta" step.
      - name: Build and push runtime image
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: ${{ steps.image_tags.outputs.runtime }}
          labels: ${{ steps.meta.outputs.labels }}
  build-flutter-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true
      - name: Install Flutter dependencies
        working-directory: flutter_ui
        run: flutter pub get
      - name: Generate Riverpod sources
        working-directory: flutter_ui
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Verify Flutter formatting
        working-directory: flutter_ui
        run: dart format --output=none --set-exit-if-changed lib test
      - name: Analyze Flutter UI
        working-directory: flutter_ui
        run: flutter analyze
      - name: Test Flutter UI
        working-directory: flutter_ui
        run: flutter test
      - name: Test native web bridge contracts
        run: node --test packaging/flutter_tizen/tests/*.test.mjs
      - name: Build production Flutter web bundle
        working-directory: flutter_ui
        run: >-
          flutter build web --release -t lib/main.dart --csp
          --base-href / --no-web-resources-cdn --no-wasm-dry-run
          --pwa-strategy=none
      - name: Verify production diagnostic assets
        working-directory: flutter_ui
        run: |
          test -f build/web/native/diagnostics.js
          test -f build/web/native/debug_bridge_config.js
          test -f build/web/native/debug_bridge.js
          grep -q "enabled: false" build/web/native/debug_bridge_config.js
          grep -q "token: ''" build/web/native/debug_bridge_config.js
      - name: Upload Flutter web bundle
        uses: actions/upload-artifact@v4
        with:
          name: moonlight-flutter-web-development
          path: flutter_ui/build/web
          if-no-files-found: error
  run-and-upload-release:
    runs-on: ubuntu-latest
    needs:
      - build-and-push-image
      - build-flutter-web
    # Sets the permissions granted to the `GITHUB_TOKEN` for the actions in this job.
    permissions:
      contents: write
      packages: read
      issues: write
      actions: write
    # This job depends on the completion of the build-and-push-image job. It checks out the repository, generates a timestamp, deletes any existing GitHub pre-releases from the same branch to avoid duplicates, extracts build artifacts from the Docker image, and creates a new GitHub pre-release with the extracted files.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download Flutter web bundle
        uses: actions/download-artifact@v4
        with:
          name: moonlight-flutter-web-development
          path: flutter_ui/build/web
      # Uses the `docker/login-action` action to log in to the Container registry using the account and password that will run the container.
      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Generates a timestamp number from the current date and time for use in tagging and pre-release.
      - name: Generate timestamp number
        run: |
          TIMESTAMP=$(TZ="CET" date +"%Y.%m%d.%H%M")
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
      # Extracts the branch name from the Git reference, replacing any slashes with dashes for compatibility in tagging and pre-release naming.
      - name: Extract branch name
        run: |
          BRANCH=${GITHUB_REF_NAME//\//-}
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
      # Sets the full Docker image tags using the output from the 'build-and-push-image' job.
      - name: Set up image tags
        run: |
          echo "RUNTIME_IMAGE=${{ needs.build-and-push-image.outputs.runtime_image }}" >> $GITHUB_ENV
      # Deletes any existing GitHub pre-releases from the same branch to avoid duplicates.
      - name: Check and delete any existing GitHub pre-releases from the same branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking for existing pre-releases from branch: $BRANCH"
          releases=$(curl -sSL \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases")
          dev_releases=$(echo "$releases" | jq -c ".[] | select(.prerelease==true and (.tag_name | contains(\"$BRANCH\")))")
          if [ -z "$dev_releases" ]; then
            echo "No pre-releases found for branch: $BRANCH"
          else
            echo "Found one or more pre-releases for branch: $BRANCH"
            echo "Starting cleanup..."
            echo "$dev_releases" | while read -r release; do
              release_id=$(echo "$release" | jq -r '.id')
              release_name=$(echo "$release" | jq -r '.name')
              tag_name=$(echo "$release" | jq -r '.tag_name')
              echo "Deleting pre-release: $release_name (ID: $release_id)"
              curl -sSL -X DELETE \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/releases/$release_id"
              echo "Deleting tag reference: $tag_name"
              curl -sSL -X DELETE \
                -H "Authorization: token $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/${tag_name}"
            done
            echo "Cleanup completed."
          fi
      - name: Run runtime container
        run: |
          docker run -d --name runtime_container "$RUNTIME_IMAGE" sleep infinity
      - name: Copy native runtime for Flutter packaging
        run: |
          mkdir -p build/flutter-runtime
          docker cp runtime_container:/home/moonlight/runtime/. build/flutter-runtime
          test -f build/flutter-runtime/moonlight-wasm.js
          test -f build/flutter-runtime/moonlight-wasm.js.mem
          test -f build/flutter-runtime/moonlight-wasm.wasm
          test -f build/flutter-runtime/moonlight-wasm.worker.js
      - name: Stage Flutter Tizen widgets
        shell: pwsh
        run: |
          ./packaging/flutter_tizen/stage-widget.ps1 `
            -FlutterBuild flutter_ui/build/web `
            -WasmBuild build/flutter-runtime `
            -Output build/flutter-tizen/widget-standard
          ./packaging/flutter_tizen/stage-widget.ps1 `
            -FlutterBuild flutter_ui/build/web `
            -WasmBuild build/flutter-runtime `
            -Output build/flutter-tizen/widget-force-game-mode `
            -ForceGameMode
      - name: Sign Flutter Tizen widgets
        run: |
          docker cp build/flutter-tizen/widget-standard runtime_container:/home/moonlight/flutter-widget-standard
          docker cp build/flutter-tizen/widget-force-game-mode runtime_container:/home/moonlight/flutter-widget-force-game-mode
          docker cp packaging/flutter_tizen/package-widget-ci.sh runtime_container:/home/moonlight/package-widget-ci.sh
          docker exec -u root runtime_container chown -R moonlight:moonlight \
            /home/moonlight/flutter-widget-standard \
            /home/moonlight/flutter-widget-force-game-mode \
            /home/moonlight/package-widget-ci.sh
          docker exec runtime_container bash /home/moonlight/package-widget-ci.sh \
            /home/moonlight/flutter-widget-standard \
            /home/moonlight/flutter-widget-force-game-mode
          docker cp runtime_container:/home/moonlight/flutter-widget-standard/MoonlightFlutter.wgt ./MoonlightFlutter.wgt
          docker cp runtime_container:/home/moonlight/flutter-widget-force-game-mode/MoonlightFlutter.wgt ./MoonlightFlutter-ForceGM.wgt
      - name: Stop and remove runtime container
        run: |
          docker stop runtime_container
          docker rm runtime_container
      # Creates a new GitHub pre-release using the extracted version and includes a detailed description.
      - name: Create GitHub pre-release
        id: create_prerelease
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.TIMESTAMP }}-${{ env.BRANCH }}
          release_name: "v${{ env.TIMESTAMP }}-${{ env.BRANCH }}"
          body: |
            # Moonlight Tizen v${{ env.TIMESTAMP }}

            - Ensure your setup meets the necessary [requirements](https://github.com/brightcraft/moonlight-tizen#%EF%B8%8F-prerequisites) for the best possible streaming experience.
            - Choose the appropriate variant from the release assets:
              - **Standard:** Download `MoonlightFlutter.wgt`.
              - **Force Game Mode:** Download `MoonlightFlutter-ForceGM.wgt`, which includes the Samsung Game Mode metadata.
            - Follow the instructions from one of the recommended [installation methods](https://github.com/brightcraft/moonlight-tizen/wiki/Installation-Guide) to install the application on your TV.

            ## What's Changed:

            - No release notes have been provided for this pre-release yet.

            **Full Changelog**: https://github.com/Leapward-Koex/moonlight-tizen/compare/vX.X.X...vX.X.X

            > [!WARNING]
            > This is a pre-release build intended for development and testing only.
            > Experimental features, bug fixes, and improvements may be unstable or incomplete.
            > Please report any unexpected behavior and provide feedback to help improve future releases.
          draft: false
          prerelease: true
      - name: Upload the widget file to GitHub pre-release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_prerelease.outputs.upload_url }}
          asset_path: ./MoonlightFlutter.wgt
          asset_name: MoonlightFlutter.wgt
          asset_content_type: application/octet-stream
      - name: Upload the Force Game Mode widget file to GitHub pre-release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_prerelease.outputs.upload_url }}
          asset_path: ./MoonlightFlutter-ForceGM.wgt
          asset_name: MoonlightFlutter-ForceGM.wgt
          asset_content_type: application/octet-stream
